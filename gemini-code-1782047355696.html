<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رد الموظف على التقييم</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 10px; width: 100%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <h2>الرد على التقييم</h2>
    <p>مرحباً <strong id="empName"></strong>، يمكنك كتابة ملاحظاتك هنا:</p>
    <textarea id="empFeedback" rows="5" style="width:100%;"></textarea>
    <button onclick="sendReply()" style="width:100%; padding:10px; background:#27ae60; border:none; color:white; margin-top:10px;">إرسال الرد للإدارة</button>
</div>

<script>
    (function(){ emailjs.init("tiXRZ3Ldls1VHF5KH"); })();
    const name = new URLSearchParams(window.location.search).get('name');
    document.getElementById('empName').innerText = name;

    async function sendReply() {
        const params = { name: name, message: document.getElementById('empFeedback').value };
        await emailjs.send("service_49n98a5", "template_YOUR_REPLY_TEMPLATE", params);
        alert("تم إرسال ردك للإدارة بنجاح!");
    }
</script>
</body>
</html>
